{% extends 'sellers/seller_base.html' %}
{% block page_content %}

<div class="form-page">
  <div class="form-card" style="text-align:center">
    <div style="font-size:2.5rem">🗂️</div>
    <h2 style="color:var(--text-primary);margin:0">Delete "{{ category.name }}"?</h2>
    <p style="color:var(--text-muted);font-size:.9rem">
      This will permanently delete this category.
      Products assigned to it will have their category set to none.
    </p>
    <form method="post" style="display:flex;gap:1rem;justify-content:center;margin-top:1rem">
      {% csrf_token %}
      <a href="{% url 'seller:seller_categories' %}" class="btn-secondary">Cancel</a>
      <button type="submit" class="btn-primary" style="background:#ef4444;border-color:#ef4444">Yes, Delete</button>
    </form>
  </div>
</div>

<style>
.form-page{max-width:460px;margin:0 auto}
.form-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:2.5rem;display:flex;flex-direction:column;gap:1rem;align-items:center}
</style>
{% endblock %}

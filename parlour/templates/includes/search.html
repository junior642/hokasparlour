<!-- Search Bar Component with Live JavaScript Search - Sticky Version -->
<style>
    /* Search bar wrapper with theme-matching background */
    .search-bar-sticky-wrapper {
        position: sticky;
        top: 0;
        z-index: 50; /* Reduced from 1000 to be below hamburger menu (usually 100+) */
        background: var(--bg);
        border-bottom: 1px solid var(--border);
        padding: 1rem 0;
        margin-bottom: 1.5rem;
        box-shadow: var(--shadow-sm);
        transition: all 0.3s ease;
        width: 100%;
    }

    /* Add slight shadow when scrolled - using theme accent */
    .search-bar-sticky-wrapper.scrolled {
        box-shadow: 0 4px 20px rgba(var(--accent-rgb), 0.15);
        border-bottom-color: var(--accent-light);
    }

    /* Container for content alignment */
    .search-bar-container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 1.5rem;
        width: 100%;
    }

    /* Enhanced search input */
    .filter-group {
        margin: 0;
    }

    .filter-group label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 600;
        font-size: 0.9rem;
        color: var(--text);
        letter-spacing: 0.3px;
    }

    .relative {
        position: relative;
    }

    #liveSearch {
        width: 100%;
        padding: 0.875rem 3rem 0.875rem 3rem;
        border: 2px solid var(--border);
        border-radius: 16px;
        background: var(--surface);
        color: var(--text);
        font-size: 0.95rem;
        transition: all 0.3s ease;
        outline: none;
        box-shadow: var(--shadow-sm);
    }

    #liveSearch:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 4px var(--accent-soft);
        transform: translateY(-1px);
    }

    #liveSearch::placeholder {
        color: var(--text-soft);
        font-style: italic;
        opacity: 0.7;
    }

    /* Animated search icon */
    .absolute.left-3 {
        position: absolute;
        left: 1rem;
        top: 50%;
        transform: translateY(-50%);
        color: var(--accent);
        transition: all 0.3s ease;
        font-size: 1rem;
        z-index: 1;
    }

    #liveSearch:focus ~ .absolute.left-3 {
        color: var(--accent-light);
        transform: translateY(-50%) scale(1.1);
    }

    /* Action buttons container */
    .search-actions {
        position: absolute;
        right: 1rem;
        top: 50%;
        transform: translateY(-50%);
        display: flex;
        align-items: center;
        gap: 0.5rem;
        z-index: 1;
    }

    /* Loading spinner animation */
    #searchSpinner i {
        animation: spin 0.8s linear infinite;
        color: var(--accent);
        font-size: 1.1rem;
    }

    /* Clear button */
    #clearSearch {
        background: transparent;
        border: none;
        color: var(--text-soft);
        cursor: pointer;
        transition: all 0.2s ease;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.2rem;
    }

    #clearSearch:hover {
        color: var(--accent);
        transform: scale(1.1);
    }

    /* Search results count */
    #searchResultsCount {
        margin-top: 0.75rem;
        font-size: 0.85rem;
        color: var(--text-soft);
        padding-left: 0.5rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }

    #resultsCount {
        background: var(--accent-soft);
        color: var(--accent);
        padding: 0.2rem 0.6rem;
        border-radius: 50px;
        font-weight: 600;
        font-size: 0.75rem;
    }

    /* Active search indicator with animation */
    #activeSearchIndicator {
        margin-top: 0.75rem;
        animation: slideDown 0.3s ease;
        position: relative;
        z-index: 40;
    }

    #activeSearchIndicator > div {
        background: var(--accent-soft);
        border: 1px solid var(--accent-light);
        border-radius: 50px;
        padding: 0.6rem 1.2rem;
        display: inline-flex;
        align-items: center;
        gap: 0.75rem;
        box-shadow: 0 4px 12px rgba(var(--accent-rgb), 0.15);
    }

    #activeSearchIndicator i {
        color: var(--accent);
    }

    #activeSearchIndicator span {
        color: var(--accent);
        font-weight: 600;
    }

    #searchTerm {
        font-style: italic;
        max-width: 200px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }

    /* No results message */
    #noResultsMessage {
        animation: fadeIn 0.4s ease;
        padding: 3rem 2rem;
        text-align: center;
        background: var(--card);
        border-radius: 24px;
        border: 1px solid var(--border);
        margin-top: 1.5rem;
        position: relative;
        z-index: 40;
    }

    #noResultsMessage i {
        font-size: 3.5rem;
        color: var(--accent-light);
        margin-bottom: 1rem;
    }

    #noResultsMessage h3 {
        color: var(--text);
        font-size: 1.5rem;
        margin-bottom: 0.5rem;
    }

    #noResultsMessage p {
        color: var(--text-soft);
        margin-bottom: 1.5rem;
    }

    #noResultsMessage button {
        background: var(--accent);
        color: white;
        border: none;
        padding: 0.75rem 2rem;
        border-radius: 50px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        position: relative;
        z-index: 1;
    }

    #noResultsMessage button:hover {
        background: var(--accent-light);
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(var(--accent-rgb), 0.3);
    }

    /* Animations */
    @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
    }

    @keyframes slideDown {
        from {
            opacity: 0;
            transform: translateY(-10px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    /* Product card transitions */
    .product-card {
        transition: opacity 0.3s ease, transform 0.3s ease, box-shadow 0.3s ease;
    }

    .product-card.search-highlight {
        animation: highlightPulse 1s ease;
    }

    @keyframes highlightPulse {
        0% { transform: scale(1); box-shadow: 0 0 0 0 var(--accent-light); }
        50% { transform: scale(1.02); box-shadow: 0 0 20px var(--accent-light); }
        100% { transform: scale(1); box-shadow: 0 0 0 0 var(--accent-light); }
    }

    /* Hidden utility */
    .hidden {
        display: none !important;
    }

    /* Dark mode specific adjustments */
    .dark-mode .search-bar-sticky-wrapper {
        background: var(--bg);
        border-bottom-color: var(--border);
    }

    .dark-mode #liveSearch {
        background: var(--surface);
        border-color: var(--border);
        color: var(--text);
    }

    .dark-mode #liveSearch:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 4px rgba(var(--accent-rgb), 0.2);
    }

    .dark-mode #noResultsMessage {
        background: var(--card);
        border-color: var(--border);
    }

    /* Responsive adjustments */
    @media (max-width: 768px) {
        .search-bar-sticky-wrapper {
            padding: 0.75rem 0;
            z-index: 45;
        }
        
        .search-bar-container {
            padding: 0 1rem;
        }
        
        #liveSearch {
            padding: 0.75rem 2.5rem 0.75rem 2.5rem;
            font-size: 0.9rem;
        }
        
        .absolute.left-3 {
            left: 0.75rem;
            font-size: 0.9rem;
        }
        
        .search-actions {
            right: 0.75rem;
        }
        
        #activeSearchIndicator > div {
            width: 100%;
            justify-content: center;
        }
        
        #searchTerm {
            max-width: 150px;
        }
    }

    @media (max-width: 480px) {
        .search-bar-sticky-wrapper {
            padding: 0.5rem 0;
            z-index: 45;
        }
        
        .search-bar-container {
            padding: 0 0.75rem;
        }
        
        #liveSearch {
            padding: 0.7rem 2rem 0.7rem 2.2rem;
            font-size: 0.85rem;
        }
        
        .absolute.left-3 {
            left: 0.6rem;
            font-size: 0.8rem;
        }
        
        .search-actions {
            right: 0.6rem;
        }
        
        #searchTerm {
            max-width: 120px;
        }
    }

    /* Ensure hamburger menu appears above search bar */
    .hamburger-menu,
    .mobile-menu,
    .nav-menu {
        z-index: 100 !important;
    }
</style>

<!-- Search Bar HTML with Sticky Wrapper -->
<div class="search-bar-sticky-wrapper" id="stickySearchBar">
    <div class="search-bar-container">
        <div class="filter-group">
            <div class="relative">
                <input type="text" 
                       id="liveSearch"
                       placeholder="Type to search products by name, category, description..." 
                       autocomplete="off">
                
                <i class="fas fa-search absolute left-3"></i>
                
                <div class="search-actions">
                    <!-- Loading spinner (hidden by default) -->
                    <div id="searchSpinner" class="hidden">
                        <i class="fas fa-spinner"></i>
                    </div>
                    
                    <!-- Clear search button -->
                    <button id="clearSearch" 
                            class="hidden"
                            onclick="clearSearch()"
                            type="button">
                        <i class="fas fa-times-circle"></i>
                    </button>
                </div>
            </div>
            
            <!-- Search results count -->
            <div id="searchResultsCount" class="hidden">
                Found <span id="resultsCount">0</span> products
            </div>
        </div>

        <!-- Active search indicator -->
        <div id="activeSearchIndicator" class="hidden">
            <div>
                <i class="fas fa-search"></i>
                <span>Searching: "<span id="searchTerm"></span>"</span>
                <button onclick="clearSearch()" type="button" class="hover:scale-110 transition-transform">
                    <i class="fas fa-times-circle"></i>
                </button>
            </div>
        </div>
    </div>
</div>

<!-- No results message (separate from sticky bar) -->
<div id="noResultsMessage" class="hidden">
    <i class="fas fa-search"></i>
    <h3>No products found</h3>
    <p>No products match your search "<span id="noResultsTerm"></span>"</p>
    <button onclick="clearSearch()" type="button">
        <i class="fas fa-undo-alt"></i> Clear Search
    </button>
</div>

<script>
// Live search functionality - Complete Fix
document.addEventListener('DOMContentLoaded', function() {
    // Add scroll effect to sticky bar
    const stickyBar = document.getElementById('stickySearchBar');
    if (stickyBar) {
        function handleScroll() {
            if (window.scrollY > 10) {
                stickyBar.classList.add('scrolled');
            } else {
                stickyBar.classList.remove('scrolled');
            }
        }
        window.addEventListener('scroll', handleScroll);
    }
    
    const searchInput = document.getElementById('liveSearch');
    const searchSpinner = document.getElementById('searchSpinner');
    const clearButton = document.getElementById('clearSearch');
    const searchResultsCount = document.getElementById('searchResultsCount');
    const resultsCountSpan = document.getElementById('resultsCount');
    const activeSearchIndicator = document.getElementById('activeSearchIndicator');
    const searchTermSpan = document.getElementById('searchTerm');
    const noResultsMessage = document.getElementById('noResultsMessage');
    const noResultsTerm = document.getElementById('noResultsTerm');
    
    // Store original HTML for each product section
    const originalSections = new Map();
    let allProducts = [];
    
    // Function to get all product containers and store original HTML
    function saveOriginalContent() {
        originalSections.clear();
        
        // Find all section containers that contain products
        const sections = document.querySelectorAll('section.mb-8, section.mb-6, section.mb-12');
        
        sections.forEach((section, index) => {
            // Store the entire section HTML
            originalSections.set(section, section.cloneNode(true));
        });
        
        // Also store the top selling section if it exists
        const topSellingSection = document.querySelector('.mb-6.lg\\:mb-10');
        if (topSellingSection) {
            originalSections.set(topSellingSection, topSellingSection.cloneNode(true));
        }
        
        console.log(`Saved ${originalSections.size} sections`);
    }
    
    // Function to extract product data from all product cards
    function extractProductData() {
        allProducts = [];
        const productCards = document.querySelectorAll('.product-card');
        
        productCards.forEach((card, index) => {
            // Find which section this card belongs to
            let section = card.closest('section');
            if (!section) {
                section = card.closest('.mb-8, .mb-6, .mb-12, .mb-6.lg\\:mb-10');
            }
            
            // Extract product name
            const nameElement = card.querySelector('h3');
            const name = nameElement ? nameElement.textContent.toLowerCase().trim() : '';
            
            // Extract description
            const descElement = card.querySelector('h3 + p');
            const description = descElement ? descElement.textContent.toLowerCase().trim() : '';
            
            // Extract price
            let price = '';
            const priceDiv = card.querySelector('.my-0\\.5.lg\\:my-2');
            if (priceDiv) {
                const normalPrice = priceDiv.querySelector('.text-xs.lg\\:text-2xl.font-extrabold');
                const discountPrice = priceDiv.querySelector('.text-xs.lg\\:text-2xl.font-extrabold.text-green-500');
                if (discountPrice) {
                    price = discountPrice.textContent.toLowerCase();
                } else if (normalPrice) {
                    price = normalPrice.textContent.toLowerCase();
                }
            }
            
            allProducts.push({
                id: index,
                element: card,
                section: section,
                name: name,
                description: description,
                price: price,
                html: card.outerHTML
            });
        });
        
        console.log(`Extracted ${allProducts.length} products`);
        return allProducts;
    }
    
    // Function to restore original content
    function restoreOriginalContent() {
        originalSections.forEach((originalSection, section) => {
            if (section && section.parentNode) {
                const newSection = originalSection.cloneNode(true);
                section.parentNode.replaceChild(newSection, section);
            }
        });
        
        // Re-extract product data after restoration
        setTimeout(() => {
            extractProductData();
        }, 100);
    }
    
    // Function to filter and display products
    function filterAndDisplay(query) {
        query = query.toLowerCase().trim();
        
        console.log(`Filtering products for: "${query}"`);
        
        if (!query) {
            // If no query, restore original content
            restoreOriginalContent();
            
            // Update UI
            if (clearButton) clearButton.classList.add('hidden');
            if (activeSearchIndicator) activeSearchIndicator.classList.add('hidden');
            if (searchResultsCount) searchResultsCount.classList.add('hidden');
            if (noResultsMessage) noResultsMessage.classList.add('hidden');
            
            return;
        }
        
        // Filter products
        const filteredProducts = allProducts.filter(product => {
            return product.name.includes(query) || 
                   product.description.includes(query) ||
                   product.price.includes(query);
        });
        
        console.log(`Found ${filteredProducts.length} matching products`);
        
        // Update results count
        if (resultsCountSpan) resultsCountSpan.textContent = filteredProducts.length;
        if (searchResultsCount) {
            if (filteredProducts.length > 0) {
                searchResultsCount.classList.remove('hidden');
            } else {
                searchResultsCount.classList.add('hidden');
            }
        }
        
        // Update active search indicator
        if (searchTermSpan) searchTermSpan.textContent = query;
        if (activeSearchIndicator) activeSearchIndicator.classList.remove('hidden');
        
        if (filteredProducts.length === 0) {
            // Show no results message
            if (noResultsTerm) noResultsTerm.textContent = query;
            if (noResultsMessage) noResultsMessage.classList.remove('hidden');
            
            // Hide all product sections
            const sections = document.querySelectorAll('section.mb-8, section.mb-6, section.mb-12, .mb-6.lg\\:mb-10');
            sections.forEach(section => {
                section.style.display = 'none';
            });
            
            return;
        }
        
        // Hide no results message
        if (noResultsMessage) noResultsMessage.classList.add('hidden');
        
        // Group filtered products by their original section
        const productsBySection = new Map();
        filteredProducts.forEach(product => {
            if (product.section) {
                if (!productsBySection.has(product.section)) {
                    productsBySection.set(product.section, []);
                }
                productsBySection.get(product.section).push(product);
            }
        });
        
        // For each section, either show filtered products or hide the section
        const sections = document.querySelectorAll('section.mb-8, section.mb-6, section.mb-12, .mb-6.lg\\:mb-10');
        
        sections.forEach(section => {
            const products = productsBySection.get(section);
            
            if (products && products.length > 0) {
                // Show this section
                section.style.display = '';
                
                // Find the grid container within this section
                const gridContainer = section.querySelector('.grid');
                if (gridContainer) {
                    // Replace the grid content with filtered products
                    gridContainer.innerHTML = products.map(product => product.html).join('');
                }
            } else {
                // Hide this section if it has no matching products
                section.style.display = 'none';
            }
        });
        
        // Add highlight animation to first result
        setTimeout(() => {
            const firstResult = document.querySelector('.product-card');
            if (firstResult) {
                firstResult.classList.add('search-highlight');
                setTimeout(() => {
                    firstResult.classList.remove('search-highlight');
                }, 1000);
            }
        }, 100);
    }
    
    // Initialize everything
    function initializeSearch() {
        console.log('Initializing search...');
        
        // Save original content
        saveOriginalContent();
        
        // Extract product data
        extractProductData();
        
        // Check if we have products
        if (allProducts.length === 0) {
            console.warn('No products found, will retry in 1 second...');
            setTimeout(initializeSearch, 1000);
            return;
        }
        
        console.log(`Search initialized successfully with ${allProducts.length} products`);
        
        // Show clear button if there's text in search input
        if (searchInput && searchInput.value.trim()) {
            filterAndDisplay(searchInput.value);
        }
    }
    
    // Set up event listeners
    if (searchInput) {
        let searchTimeout;
        
        searchInput.addEventListener('input', function(e) {
            const query = e.target.value;
            
            // Show loading spinner
            if (searchSpinner) searchSpinner.classList.remove('hidden');
            
            // Show/hide clear button
            if (clearButton) {
                if (query.length > 0) {
                    clearButton.classList.remove('hidden');
                } else {
                    clearButton.classList.add('hidden');
                }
            }
            
            // Clear previous timeout
            clearTimeout(searchTimeout);
            
            // Set new timeout for debounce
            searchTimeout = setTimeout(() => {
                filterAndDisplay(query);
                if (searchSpinner) searchSpinner.classList.add('hidden');
            }, 300);
        });
        
        // Handle keyboard shortcut (Escape to clear)
        searchInput.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                e.preventDefault();
                clearSearch();
            }
        });
        
        // Prevent form submission on enter
        searchInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                filterAndDisplay(e.target.value);
            }
        });
    }
    
    // Clear search function
    window.clearSearch = function() {
        if (searchInput) {
            searchInput.value = '';
            searchInput.focus();
            filterAndDisplay('');
            
            if (searchSpinner) searchSpinner.classList.add('hidden');
            if (clearButton) clearButton.classList.add('hidden');
            if (activeSearchIndicator) activeSearchIndicator.classList.add('hidden');
            if (searchResultsCount) searchResultsCount.classList.add('hidden');
            if (noResultsMessage) noResultsMessage.classList.add('hidden');
        }
    };
    
    // Start initialization
    initializeSearch();
    
    // Watch for filter form submissions (category, gender, price filters)
    const filterForms = document.querySelectorAll('form');
    filterForms.forEach(form => {
        form.addEventListener('submit', function(e) {
            // Allow the form to submit normally, but reinitialize search after
            setTimeout(() => {
                console.log('Filter applied, reinitializing search...');
                saveOriginalContent();
                extractProductData();
                
                // If there's text in search, reapply filter
                if (searchInput && searchInput.value.trim()) {
                    filterAndDisplay(searchInput.value);
                }
            }, 500);
        });
    });
    
    // Also watch for filter links (gender tabs, category links)
    const filterLinks = document.querySelectorAll('a[href*="category"], a[href*="gender"], a[href*="min_price"], a[href*="max_price"]');
    filterLinks.forEach(link => {
        link.addEventListener('click', function() {
            setTimeout(() => {
                console.log('Filter link clicked, reinitializing search...');
                saveOriginalContent();
                extractProductData();
                
                // If there's text in search, reapply filter
                if (searchInput && searchInput.value.trim()) {
                    filterAndDisplay(searchInput.value);
                }
            }, 500);
        });
    });
});
</script>

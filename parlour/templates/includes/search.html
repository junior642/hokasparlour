<!-- Search Bar Component with Dropdown Results Panel -->
<style>
    .search-bar-sticky-wrapper {
        position: sticky;
        top: 0;
        z-index: 50;
        background: var(--bg);
        border-bottom: 1px solid var(--border);
        padding: 1rem 0;
        margin-bottom: 1.5rem;
        box-shadow: var(--shadow-sm);
        transition: all 0.3s ease;
        width: 100%;
    }

    .search-bar-sticky-wrapper.scrolled {
        box-shadow: 0 4px 20px rgba(var(--accent-rgb), 0.15);
        border-bottom-color: var(--accent-light);
    }

    .search-bar-container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 1.5rem;
        width: 100%;
        position: relative;
    }

    .filter-group {
        margin: 0;
    }

    .relative {
        position: relative;
    }

    #liveSearch {
        width: 100%;
        padding: 0.875rem 3rem 0.875rem 3rem;
        border: 2px solid var(--border);
        border-radius: 16px;
        background: var(--surface);
        color: var(--text);
        font-size: 0.95rem;
        transition: all 0.3s ease;
        outline: none;
        box-shadow: var(--shadow-sm);
        box-sizing: border-box;
    }

    #liveSearch:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 4px var(--accent-soft);
    }

    #liveSearch.results-open {
        border-radius: 16px 16px 0 0;
        border-bottom-color: var(--border);
    }

    #liveSearch::placeholder {
        color: var(--text-soft);
        font-style: italic;
        opacity: 0.7;
    }

    .absolute.left-3 {
        position: absolute;
        left: 1rem;
        top: 50%;
        transform: translateY(-50%);
        color: var(--accent);
        transition: all 0.3s ease;
        font-size: 1rem;
        z-index: 1;
        pointer-events: none;
    }

    .search-actions {
        position: absolute;
        right: 1rem;
        top: 50%;
        transform: translateY(-50%);
        display: flex;
        align-items: center;
        gap: 0.5rem;
        z-index: 1;
    }

    #searchSpinner i {
        animation: spin 0.8s linear infinite;
        color: var(--accent);
        font-size: 1.1rem;
    }

    #clearSearch {
        background: transparent;
        border: none;
        color: var(--text-soft);
        cursor: pointer;
        transition: all 0.2s ease;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.2rem;
    }

    #clearSearch:hover {
        color: var(--accent);
        transform: scale(1.1);
    }

    /* ============================================
       DROPDOWN RESULTS PANEL
       ============================================ */
    #searchDropdown {
        position: absolute;
        top: 100%;
        left: 1.5rem;
        right: 1.5rem;
        background: var(--card, #fff);
        border: 2px solid var(--accent);
        border-top: none;
        border-radius: 0 0 16px 16px;
        box-shadow: 0 12px 40px rgba(0,0,0,0.15);
        z-index: 200;
        display: none;
        overflow: hidden;
    }

    #searchDropdown.open {
        display: block;
        animation: dropdownSlide 0.2s ease;
    }

    @keyframes dropdownSlide {
        from { opacity: 0; transform: translateY(-8px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    /* Dropdown header */
    .dropdown-header {
        padding: 0.6rem 1rem;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
    }

    .dropdown-header .result-label {
        font-size: 0.8rem;
        color: var(--text-soft);
        font-weight: 500;
    }

    .dropdown-header .result-count {
        background: var(--accent-soft);
        color: var(--accent);
        padding: 0.15rem 0.6rem;
        border-radius: 50px;
        font-weight: 700;
        font-size: 0.75rem;
    }

    /* ---- 2-row horizontal scroll grid ---- */
    #dropdownResults {
        overflow-x: auto;
        overflow-y: hidden;
        padding: 0.75rem 0.75rem 0.5rem;
        scrollbar-width: thin;
        scrollbar-color: var(--accent) var(--border);
    }

    #dropdownResults::-webkit-scrollbar {
        height: 5px;
    }
    #dropdownResults::-webkit-scrollbar-track {
        background: var(--border);
        border-radius: 10px;
    }
    #dropdownResults::-webkit-scrollbar-thumb {
        background: var(--accent);
        border-radius: 10px;
    }

    .results-card-grid {
        display: grid;
        grid-auto-flow: column;
        grid-template-rows: repeat(2, auto);
        grid-auto-columns: 140px;
        gap: 0.6rem;
        width: max-content;
    }

    /* Individual product card in results */
    .search-result-item {
        display: flex;
        flex-direction: column;
        text-decoration: none;
        color: inherit;
        background: var(--surface, #f9f9f9);
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
        transition: border-color 0.15s ease, box-shadow 0.15s ease;
        cursor: pointer;
        width: 140px;
    }

    .search-result-item:hover {
        border-color: var(--accent);
        box-shadow: 0 4px 12px rgba(var(--accent-rgb), 0.15);
    }

    /* Product image in card */
    .result-thumb {
        width: 100%;
        aspect-ratio: 1 / 1;
        overflow: hidden;
        background: var(--surface);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-soft);
        font-size: 1.4rem;
        flex-shrink: 0;
    }

    .result-thumb img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    /* Card body */
    .result-info {
        padding: 0.4rem 0.5rem 0.5rem;
        display: flex;
        flex-direction: column;
        gap: 0.2rem;
        flex: 1;
    }

    .result-name {
        font-size: 0.72rem;
        font-weight: 600;
        color: var(--text);
        overflow: hidden;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        line-height: 1.3;
    }

    .result-name mark {
        background: var(--accent-soft);
        color: var(--accent);
        border-radius: 3px;
        padding: 0 2px;
        font-weight: 700;
    }

    .result-meta {
        display: flex;
        align-items: center;
        gap: 0.3rem;
        flex-wrap: wrap;
    }

    .result-category {
        font-size: 0.62rem;
        background: var(--accent-soft);
        color: var(--accent);
        padding: 0.1rem 0.4rem;
        border-radius: 50px;
        font-weight: 500;
        white-space: nowrap;
    }

    .result-stock-badge {
        font-size: 0.62rem;
        padding: 0.1rem 0.4rem;
        border-radius: 50px;
        font-weight: 500;
        white-space: nowrap;
    }

    .result-stock-ready  { background: #d1fae5; color: #065f46; }
    .result-stock-order  { background: #fef3c7; color: #92400e; }
    .result-stock-out    { background: #fee2e2; color: #991b1b; }

    .result-price .price-main {
        font-size: 0.78rem;
        font-weight: 700;
        color: var(--accent);
        display: block;
    }

    .result-price .price-main.discounted { color: #16a34a; }

    .result-price .price-old {
        font-size: 0.65rem;
        color: var(--text-soft);
        text-decoration: line-through;
        display: block;
    }

    /* No results state */
    .dropdown-no-results {
        padding: 2rem 1rem;
        text-align: center;
        color: var(--text-soft);
    }

    .dropdown-no-results i {
        font-size: 2rem;
        color: var(--accent-light);
        display: block;
        margin-bottom: 0.5rem;
    }

    .dropdown-no-results p {
        font-size: 0.9rem;
        margin: 0 0 0.25rem;
    }

    .dropdown-no-results small {
        font-size: 0.78rem;
        opacity: 0.7;
    }

    /* Footer "view all" link */
    .dropdown-footer {
        padding: 0.6rem 1rem;
        border-top: 1px solid var(--border);
        text-align: center;
        font-size: 0.8rem;
        color: var(--accent);
        cursor: pointer;
        font-weight: 600;
        transition: background 0.15s ease;
        display: none;
    }

    .dropdown-footer:hover {
        background: var(--accent-soft);
    }

    .dropdown-footer.visible {
        display: block;
    }

    /* Hidden utility */
    .hidden {
        display: none !important;
    }

    /* Animations */
    @keyframes spin {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
    }

    /* Ensure hamburger menu appears above search bar */
    .hamburger-menu,
    .mobile-menu,
    .nav-menu {
        z-index: 100 !important;
    }

    /* Responsive */
    @media (max-width: 768px) {
        .search-bar-sticky-wrapper { padding: 0.75rem 0; z-index: 45; }
        .search-bar-container { padding: 0 1rem; }
        #liveSearch { padding: 0.75rem 2.5rem; font-size: 0.9rem; }
        #searchDropdown { left: 1rem; right: 1rem; }
        .results-card-grid { grid-auto-columns: 120px; }
        .search-result-item { width: 120px; }
    }

    @media (max-width: 480px) {
        .search-bar-container { padding: 0 0.75rem; }
        #liveSearch { padding: 0.7rem 2rem 0.7rem 2.2rem; font-size: 0.85rem; }
        #searchDropdown { left: 0.75rem; right: 0.75rem; }
        .results-card-grid { grid-auto-columns: 110px; }
        .search-result-item { width: 110px; }
    }
</style>

<!-- Search Bar HTML -->
<div class="search-bar-sticky-wrapper" id="stickySearchBar">
    <div class="search-bar-container">
        <div class="filter-group">
            <div class="relative">
                <input type="text"
                       id="liveSearch"
                       placeholder="Search products by name, category, description..."
                       autocomplete="off">

                <i class="fas fa-search absolute left-3"></i>

                <div class="search-actions">
                    <div id="searchSpinner" class="hidden">
                        <i class="fas fa-spinner"></i>
                    </div>
                    <button id="clearSearch"
                            class="hidden"
                            onclick="clearSearch()"
                            type="button">
                        <i class="fas fa-times-circle"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- DROPDOWN RESULTS PANEL (appears right below the search bar) -->
        <div id="searchDropdown">
            <div class="dropdown-header">
                <span class="result-label">Results</span>
                <span class="result-count" id="dropdownCount">0</span>
            </div>
            <div id="dropdownResults"></div>
            <div class="dropdown-footer" id="dropdownFooter" onclick="clearSearch()">
                <i class="fas fa-times-circle"></i> Close results
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {

    const stickyBar = document.getElementById('stickySearchBar');
    if (stickyBar) {
        window.addEventListener('scroll', function () {
            stickyBar.classList.toggle('scrolled', window.scrollY > 10);
        });
    }

    const searchInput    = document.getElementById('liveSearch');
    const searchSpinner  = document.getElementById('searchSpinner');
    const clearButton    = document.getElementById('clearSearch');
    const dropdown       = document.getElementById('searchDropdown');
    const dropdownRes    = document.getElementById('dropdownResults');
    const dropdownCount  = document.getElementById('dropdownCount');
    const dropdownFooter = document.getElementById('dropdownFooter');

    // ------------------------------------------------
    // Collect product data from the existing page cards
    // ------------------------------------------------
    let allProducts = [];

    function extractProductData() {
        allProducts = [];
        document.querySelectorAll('.product-card').forEach(function (card, index) {
            const nameEl  = card.querySelector('h3');
            const descEl  = nameEl ? nameEl.nextElementSibling : null;
            const imgEl   = card.querySelector('img');
            const linkEl  = card.closest('a') || card.querySelector('a');

            // Price text
            let priceText = '';
            let oldPrice  = '';
            const priceDiv = card.querySelector('.my-0\\.5\\.lg\\:my-2, [class*="my-0"]');
            if (priceDiv) {
                const bold = priceDiv.querySelectorAll('[class*="font-extrabold"]');
                bold.forEach(function(el) {
                    if (el.classList.contains('text-green-500')) {
                        priceText = el.textContent.trim();
                    } else if (!priceText) {
                        priceText = el.textContent.trim();
                    }
                });
                const struck = priceDiv.querySelector('.line-through');
                if (struck) oldPrice = struck.textContent.trim();
            }
            if (!priceText) {
                const anyBold = card.querySelector('[class*="font-extrabold"]');
                if (anyBold) priceText = anyBold.textContent.trim();
            }

            // Category badge
            let category = '';
            const catBadge = card.querySelector('.rounded-full');
            if (catBadge) category = catBadge.textContent.trim();

            // Stock status
            let stockText  = '';
            let stockType  = 'order';
            const stockEl  = card.querySelector('[class*="fa-box"]');
            if (stockEl && stockEl.parentElement) {
                const stockSpan = stockEl.parentElement.querySelector('span');
                if (stockSpan) {
                    stockText = stockSpan.textContent.trim();
                    if (stockSpan.style.color === 'rgb(239, 68, 68)' || stockSpan.textContent.toLowerCase().includes('out')) {
                        stockType = 'out';
                    } else if (stockSpan.textContent.toLowerCase().includes('in stock')) {
                        stockType = 'ready';
                    }
                }
            }

            // Link href
            const href = (linkEl && linkEl.tagName === 'A') ? linkEl.getAttribute('href') : '#';

            allProducts.push({
                name:      nameEl  ? nameEl.textContent.trim()  : '',
                desc:      descEl  ? descEl.textContent.trim()  : '',
                imgSrc:    imgEl   ? imgEl.getAttribute('src')  : '',
                price:     priceText,
                oldPrice:  oldPrice,
                category:  category,
                stockText: stockText,
                stockType: stockType,
                href:      href,
                searchStr: ((nameEl ? nameEl.textContent : '') + ' ' +
                            (descEl ? descEl.textContent : '') + ' ' +
                            priceText + ' ' + category).toLowerCase()
            });
        });
    }

    extractProductData();

    // Retry if no products found yet (lazy-rendered pages)
    if (allProducts.length === 0) {
        setTimeout(extractProductData, 1000);
    }

    // ------------------------------------------------
    // Highlight matching text
    // ------------------------------------------------
    function highlight(text, query) {
        if (!query) return escHtml(text);
        const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        return escHtml(text).replace(
            new RegExp('(' + escaped + ')', 'gi'),
            '<mark>$1</mark>'
        );
    }

    function escHtml(str) {
        const d = document.createElement('div');
        d.appendChild(document.createTextNode(str));
        return d.innerHTML;
    }

    // ------------------------------------------------
    // Build dropdown HTML
    // ------------------------------------------------
    function buildDropdown(query) {
        query = query.toLowerCase().trim();

        if (!query) {
            closeDropdown();
            return;
        }

        const matches = allProducts.filter(function(p) {
            return p.searchStr.includes(query);
        });

        dropdownCount.textContent = matches.length;

        if (matches.length === 0) {
            dropdownRes.innerHTML =
                '<div class="dropdown-no-results">' +
                '<i class="fas fa-search"></i>' +
                '<p>No products found for <strong>' + escHtml(query) + '</strong></p>' +
                '<small>Try a different keyword</small>' +
                '</div>';
            dropdownFooter.classList.remove('visible');
        } else {
            // All matches shown in a 2-row grid that scrolls horizontally
            const cards = matches.map(function(p) {
                const thumbHtml = p.imgSrc
                    ? '<img src="' + escHtml(p.imgSrc) + '" alt="' + escHtml(p.name) + '" loading="lazy">'
                    : '<i class="fas fa-image"></i>';

                const priceHtml = p.oldPrice
                    ? '<span class="price-old">' + escHtml(p.oldPrice) + '</span>' +
                      '<span class="price-main discounted">' + escHtml(p.price) + '</span>'
                    : '<span class="price-main">' + escHtml(p.price) + '</span>';

                const stockClass = p.stockType === 'ready' ? 'result-stock-ready'
                                 : p.stockType === 'out'   ? 'result-stock-out'
                                 : 'result-stock-order';

                const stockLabel = p.stockType === 'ready' ? 'Ready'
                                 : p.stockType === 'out'   ? 'Out of stock'
                                 : 'On order';

                return '<a href="' + escHtml(p.href) + '" class="search-result-item">' +
                    '<div class="result-thumb">' + thumbHtml + '</div>' +
                    '<div class="result-info">' +
                        '<div class="result-name">' + highlight(p.name, query) + '</div>' +
                        '<div class="result-meta">' +
                            (p.category ? '<span class="result-category">' + escHtml(p.category) + '</span>' : '') +
                            '<span class="result-stock-badge ' + stockClass + '">' + stockLabel + '</span>' +
                        '</div>' +
                        '<div class="result-price">' + priceHtml + '</div>' +
                    '</div>' +
                    '</a>';
            }).join('');

            dropdownRes.innerHTML = '<div class="results-card-grid">' + cards + '</div>';

            dropdownFooter.innerHTML = '<i class="fas fa-times-circle"></i> Close results';
            dropdownFooter.classList.add('visible');
            dropdownFooter.onclick = clearSearch;
        }

        openDropdown();
    }

    function openDropdown() {
        dropdown.classList.add('open');
        searchInput.classList.add('results-open');
    }

    function closeDropdown() {
        dropdown.classList.remove('open');
        searchInput.classList.remove('results-open');
    }

    // ------------------------------------------------
    // Event listeners
    // ------------------------------------------------
    if (searchInput) {
        let searchTimeout;

        searchInput.addEventListener('input', function (e) {
            const q = e.target.value;

            if (searchSpinner) searchSpinner.classList.remove('hidden');
            clearButton && (q.length > 0
                ? clearButton.classList.remove('hidden')
                : clearButton.classList.add('hidden'));

            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(function () {
                buildDropdown(q);
                if (searchSpinner) searchSpinner.classList.add('hidden');
            }, 250);
        });

        searchInput.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') { e.preventDefault(); clearSearch(); }
        });

        searchInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') { e.preventDefault(); }
        });
    }

    // Close dropdown when clicking outside
    document.addEventListener('click', function (e) {
        if (!e.target.closest('#stickySearchBar')) {
            closeDropdown();
        }
    });

    // Reopen dropdown if user clicks back in input and there's a query
    searchInput && searchInput.addEventListener('focus', function () {
        if (searchInput.value.trim()) {
            buildDropdown(searchInput.value);
        }
    });

    // ------------------------------------------------
    // Global clearSearch
    // ------------------------------------------------
    window.clearSearch = function () {
        if (searchInput) {
            searchInput.value = '';
            searchInput.focus();
        }
        if (searchSpinner) searchSpinner.classList.add('hidden');
        if (clearButton)   clearButton.classList.add('hidden');
        closeDropdown();
    };

    // Re-extract products after filter form submissions (category/gender/price)
    document.querySelectorAll('form').forEach(function (form) {
        form.addEventListener('submit', function () {
            setTimeout(extractProductData, 500);
        });
    });

    document.querySelectorAll('a[href*="category"], a[href*="gender"], a[href*="min_price"], a[href*="max_price"]')
        .forEach(function (link) {
            link.addEventListener('click', function () {
                setTimeout(extractProductData, 500);
            });
        });
});
</script>

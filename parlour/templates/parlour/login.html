<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Login · Hoka's Parlour | MMU</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome 6 (includes Google brand icon) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        /* ----- same purple theme, zero waste, mobile-first (copied from original with minor polish) ----- */
        :root {
            --bg: #ffffff;
            --surface: #f8fafc;
            --card: #ffffff;
            --text: #0a0a0a;
            --text-soft: #334155;
            --border: #e2e8f0;
            --accent: #7b2eda;
            --accent-light: #a78bfa;
            --accent-soft: #f3e8ff;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.02);
            --shadow: 0 10px 25px -5px rgba(0,0,0,0.03);
            --shadow-md: 0 20px 30px -10px rgba(0,0,0,0.05);
            --transition: all 0.25s ease;
            --header-bg: rgba(255,255,255,0.9);
            --gradient: linear-gradient(145deg, #7b2eda, #a78bfa);
        }
        .dark-mode {
            --bg: #0a0a0c;
            --surface: #16161c;
            --card: #1e1e24;
            --text: #f0f0fa;
            --text-soft: #b0b0c5;
            --border: #2c2c35;
            --accent: #b287fd;
            --accent-light: #d4adff;
            --accent-soft: #281f3a;
            --header-bg: rgba(10,10,12,0.9);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, var(--bg), var(--surface));
            color: var(--text);
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background-color 0.25s, color 0.25s;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(123,46,218,0.03) 0%, transparent 70%);
            animation: pulse 20s infinite;
            pointer-events: none;
            z-index: 0;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.2); opacity: 0.5; }
        }
        /* header simplified for demo */
        header {
            background: var(--header-bg);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 1rem;
            position: relative;
            z-index: 100;
        }
        .header-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo { font-size: 1.5rem; font-weight: 800; font-family: 'Playfair Display', serif; color: var(--text); text-decoration: none; letter-spacing: -0.5px; }
        .logo span { color: var(--accent); }
        .desktop-nav { display: flex; align-items: center; gap: 0.5rem; }
        .desktop-nav a { color: var(--text-soft); text-decoration: none; padding: 0.5rem 1rem; font-weight: 500; border-radius: 40px; transition: var(--transition); display: flex; align-items: center; gap: 6px; }
        .desktop-nav a:hover { color: var(--accent); background: var(--accent-soft); }
        .theme-toggle { background: var(--accent-soft); border: none; color: var(--accent); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; margin-left: 0.5rem; }
        .theme-toggle:hover { background: var(--accent); color: white; }
        
        .main-content { flex: 1; display: flex; align-items: center; justify-content: center; padding: 1rem; position: relative; z-index: 1; min-height: calc(100vh - 80px); }
        .auth-container { width: 100%; max-width: 440px; animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .auth-card {
            background: var(--card); border-radius: 32px; padding: 2rem; box-shadow: var(--shadow-md);
            border: 1px solid var(--border); position: relative; overflow: hidden;
        }
        .auth-card::after {
            content: ''; position: absolute; top: -50%; right: -50%; width: 200px; height: 200px;
            background: radial-gradient(circle, rgba(123,46,218,0.05) 0%, transparent 70%); border-radius: 50%; z-index: 0;
        }
        .auth-header { text-align: center; margin-bottom: 2rem; position: relative; z-index: 1; }
        .auth-icon {
            width: 80px; height: 80px; background: var(--accent-soft); border-radius: 30px;
            display: flex; align-items: center; justify-content: center; margin: 0 auto 1.25rem;
            border: 2px solid var(--accent); box-shadow: 0 10px 20px -8px rgba(123,46,218,0.3);
            transition: transform 0.3s ease;
        }
        .auth-card:hover .auth-icon { transform: rotate(5deg) scale(1.05); }
        .auth-icon i { font-size: 2.5rem; color: var(--accent); }
        .auth-header h1 { font-size: 2rem; font-weight: 800; color: var(--text); font-family: 'Playfair Display', serif; margin-bottom: 0.5rem; }
        .auth-header h1 span { color: var(--accent); }
        .auth-header p { color: var(--text-soft); font-size: 0.95rem; display: flex; align-items: center; justify-content: center; gap: 8px; }

        /* ----- TWO OPTIONS: GOOGLE + EMAIL BUTTONS ----- */
        .login-options {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 1.8rem;
            position: relative;
            z-index: 2;
        }

        .option-btn {
            width: 100%;
            padding: 1.1rem 1.2rem;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            border: 2px solid var(--border);
            background: var(--card);
            color: var(--text);
            cursor: pointer;
            transition: var(--transition);
            box-shadow: var(--shadow-sm);
            letter-spacing: 0.2px;
            text-decoration: none;
        }

        .option-btn i {
            font-size: 1.4rem;
            color: var(--accent);
            transition: transform 0.2s;
        }

        .option-btn .fa-google { color: #ea4335; }  /* google red */

        .option-btn:hover {
            border-color: var(--accent);
            background: var(--accent-soft);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -8px var(--accent);
        }

        .option-btn.active-option {
            border-color: var(--accent);
            background: var(--accent-soft);
            box-shadow: 0 0 0 4px rgba(123,46,218,0.15);
        }

        /* divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: var(--text-soft);
            font-size: 0.9rem;
            margin: 0.5rem 0 1rem;
            z-index: 2;
            position: relative;
        }
        .divider-line {
            height: 2px;
            background: var(--border);
            flex: 1;
        }

        /* hidden email form – appears when email option selected */
        .email-form-wrapper {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s ease, margin 0.3s;
            margin-top: 0;
            z-index: 2;
            position: relative;
            pointer-events: none;
        }

        .email-form-wrapper.show {
            max-height: 550px;     /* plenty for form */
            opacity: 1;
            margin-top: 1.5rem;
            pointer-events: all;
        }

        .auth-form { display: flex; flex-direction: column; gap: 1.25rem; }
        .form-group { display: flex; flex-direction: column; gap: 0.5rem; }
        .form-group label { display: flex; align-items: center; gap: 8px; font-weight: 600; color: var(--text); font-size: 0.9rem; }
        .form-group label i { color: var(--accent); width: 18px; }
        .form-group input {
            width: 100%; padding: 1rem 1.2rem; border: 2px solid var(--border); border-radius: 20px;
            font-size: 1rem; background: var(--surface); color: var(--text); transition: all 0.2s ease;
        }
        .form-group input:focus {
            outline: none; border-color: var(--accent); box-shadow: 0 0 0 4px rgba(123,46,218,0.1); background: var(--card);
        }
        .password-wrapper { position: relative; }
        .password-toggle {
            position: absolute; right: 1rem; top: 50%; transform: translateY(-50%);
            background: transparent; border: none; color: var(--text-soft); cursor: pointer; padding: 0.5rem; border-radius: 10px;
        }
        .password-toggle:hover { color: var(--accent); background: var(--accent-soft); }

        .auth-btn {
            width: 100%; padding: 1.1rem; background: linear-gradient(145deg, var(--accent), var(--accent-light));
            color: white; border: none; border-radius: 50px; font-size: 1rem; font-weight: 700;
            display: flex; align-items: center; justify-content: center; gap: 12px; cursor: pointer;
            transition: all 0.3s ease; margin-top: 0.5rem; border: 2px solid transparent;
        }
        .auth-btn:hover { transform: translateY(-3px); box-shadow: 0 12px 25px -8px rgba(123,46,218,0.5); }
        .auth-btn i { transition: transform 0.25s; }
        .auth-btn:hover i { transform: translateX(5px); }

        .auth-footer { margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--border); text-align: center; position: relative; z-index: 2; }
        .signup-link { display: inline-flex; align-items: center; gap: 10px; padding: 0.9rem 2rem; background: var(--accent-soft); color: var(--accent); text-decoration: none; border-radius: 50px; font-weight: 700; transition: all 0.3s ease; border: 1px solid var(--border); }
        .signup-link:hover { background: var(--accent); color: white; transform: translateY(-3px); }

        /* message demo */
        .demo-note { background: var(--accent-soft); padding: 0.75rem; border-radius: 40px; text-align: center; font-size: 0.9rem; color: var(--accent); margin: 1rem 0 0; border: 1px dashed var(--accent-light); }

        @media (max-width: 480px) {
            .auth-card { padding: 1.5rem; }
            .option-btn { padding: 0.9rem 1rem; font-size: 1rem; }
        }
    </style>
</head>
<body>
    <!-- HEADER -->
    <header>
        <div class="header-container">
            <a href="#" class="logo">HOKA'S<span>PARLOUR</span></a>
            <nav class="desktop-nav">
                <a href="#"><i class="fas fa-home"></i> Home</a>
                <a href="#"><i class="fas fa-shopping-bag"></i> Cart</a>
                <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>
            </nav>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="main-content">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <div class="auth-icon"><i class="fas fa-lock"></i></div>
                    <h1>Welcome <span>Back</span></h1>
                    <p><i class="fas fa-graduation-cap"></i> MMU Student Exclusive</p>
                </div>

                <!-- IMPORTANT: Load socialaccount tags at the top of the file,
                     but since this is the full template, we put it here -->
                {% load socialaccount %}

                <!-- TWO OPTIONS: GOOGLE + EMAIL -->
                <div class="login-options">
                    <!-- Google option with icon - DIRECT LINK, NO JAVASCRIPT -->
                    <form id="googleForm" method="post" action="{% provider_login_url 'google' %}">
    {% csrf_token %}
    <button type="submit" class="option-btn" id="googleOption">
        <i class="fab fa-google"></i>
        <span>Login with Google</span>
    </button>
</form>

                    <!-- Email option (click to reveal form) -->
                    <button class="option-btn" id="emailOption">
                        <i class="fas fa-envelope"></i>
                        <span>Login with Email</span>
                    </button>
                </div>

                <!-- Divider -->
                <div class="divider">
                    <span class="divider-line"></span>
                    <span>secure login</span>
                    <span class="divider-line"></span>
                </div>

                <!-- Hidden email form (appears when email option selected) -->
                <div class="email-form-wrapper" id="emailFormWrapper">
                    <!-- Login form - submits to the same view -->
                    <form method="post" class="auth-form" id="loginForm" action="{% url 'login' %}">
                        {% csrf_token %}
                        
                        <div class="form-group">
                            <label><i class="fas fa-user"></i> Username / Email</label>
                            <input type="text" name="username" placeholder="your@mmu.ac.uk" required>
                        </div>

                        <div class="form-group">
                            <label><i class="fas fa-key"></i> Password</label>
                            <div class="password-wrapper">
                                <input type="password" name="password" id="id_password_demo" placeholder="••••••••" required>
                                <button type="button" class="password-toggle" onclick="togglePasswordDemo()">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>

                        <button type="submit" class="auth-btn" id="submitBtn">
                            <span>Log In with Email</span>
                            <i class="fas fa-arrow-right"></i>
                        </button>
                    </form>
                </div>

                <!-- Footer signup etc -->
                <div class="auth-footer">
                    <p>Don't have an account?</p>
                    <a href="{% url 'signup' %}" class="signup-link">
                        <span>Create Account</span> <i class="fas fa-user-plus"></i>
                    </a>
                </div>
            </div>
        </div>
    </main>

    <script>
        // --- dark mode 
        const root = document.documentElement;
        const themeToggle = document.getElementById('themeToggle');
        function setDarkMode(isDark) {
            if (isDark) { root.classList.add('dark-mode'); themeToggle.innerHTML = '<i class="fas fa-sun"></i>'; }
            else { root.classList.remove('dark-mode'); themeToggle.innerHTML = '<i class="fas fa-moon"></i>'; }
            localStorage.setItem('hokasparlour_theme', isDark ? 'dark' : 'light');
        }
        const savedTheme = localStorage.getItem('hokasparlour_theme');
        if (savedTheme === 'dark') setDarkMode(true);
        else if (savedTheme === 'light') setDarkMode(false);
        else setDarkMode(window.matchMedia('(prefers-color-scheme: dark)').matches);
        themeToggle.addEventListener('click', function() { setDarkMode(!root.classList.contains('dark-mode')); });

        // --- Two-option toggle: Email reveals form
        const googleBtn = document.getElementById('googleOption');
        const emailBtn = document.getElementById('emailOption');
        const emailFormWrapper = document.getElementById('emailFormWrapper');

        // Email option: reveal form
        emailBtn.addEventListener('click', function(e) {
            e.preventDefault();
            emailFormWrapper.classList.add('show');
            emailBtn.classList.add('active-option');
            // Scroll into view smoothly
            emailFormWrapper.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        });

        // toggle password
        window.togglePasswordDemo = function() {
            const pwd = document.getElementById('id_password_demo');
            const icon = document.querySelector('.password-toggle i');
            if (pwd.type === 'password') {
                pwd.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                pwd.type = 'password';
                icon.className = 'fas fa-eye';
            }
        };

        // If there are form errors, keep the form visible
        // Check if the form has errors (you'd need to pass this from Django)
        // For simplicity, we'll check if there's a non-field error or field errors
        // This is a simple approach - you might need to customize based on your Django setup
        {% if form.errors %}
            // Keep email form visible if there are errors
            document.addEventListener('DOMContentLoaded', function() {
                emailFormWrapper.classList.add('show');
                emailBtn.classList.add('active-option');
            });
        {% endif %}
    </script>
</body>
</html>
